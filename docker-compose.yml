services:
  postgres:
    image: postgres:16-alpine
    container_name: ukps-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ukps
      POSTGRES_PASSWORD: ukps
      POSTGRES_DB: ukps
    ports:
      # Host 5433 -> container 5432, to avoid clashing with a local Postgres on 5432.
      - "5433:5432"
    volumes:
      - ukps-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ukps"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ukps-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ukps-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ukps-postgres:
  ukps-redis:
