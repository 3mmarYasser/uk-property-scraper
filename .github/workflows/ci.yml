name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ukps
          POSTGRES_PASSWORD: ukps
          POSTGRES_DB: ukps
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U ukps"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .env
        run: cp .env.example .env

      - name: Build (generates Prisma client + compiles all packages)
        run: pnpm build

      - name: Apply database migrations
        run: pnpm --filter @ukps/database migrate:deploy

      - name: Run tests
        run: pnpm test
